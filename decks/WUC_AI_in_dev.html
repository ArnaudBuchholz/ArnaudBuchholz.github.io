|title|**AI** in **Development**|

### AI in development

- AI is **everywhere**
- AI is now an **integral part** of the developer **toolset**

*"With great **power** comes great **responsibility**"*<br>— Uncle Ben

---

#### AI Limitations

AI output is not **reliable** by design,<br>it is **probabilistic**.

- **Hallucinations**<br><small>Invented package names, non-existent APIs, fabricated documentation</small>
- **Non-determinist**<br><small>The same prompt can produce different results on different runs</small>
- **Confidence is not correctness**<br><small>The tone of the output is not a signal of its accuracy</small>

---

#### Engineering practices still matter

* **TDD**<br><small>Tests clarify the intent before implementing</small>
* **Linting / code style**<br><small>Automated guardrails catch what AI generates inconsistently</small>
* **Small commits**<br><small>Keep changes reviewable</small>
* **Code review**<br><small>Review the code as if written by a colleague</small>
* **Document decisions**<br><small>AI knows *what* you asked, not *why*</small>

---

#### Human in the loop 1/2

The developer is a **deliberate checkpoint** in an AI-assisted process:
*reviewing*, *approving*, or *correcting* before output is acted upon or propagated further.

> <small>Similar to **4 eyes** principle.</small>

---

#### Human in the loop 2/2

- Reading and understanding a diff **before** accepting it, not just running tests
- Catching when the AI solved the **stated** problem but missed the **actual** intent
- Noticing when the generated code is **technically** correct but **architecturally** wrong in the given context

> <small>Use **plan** to interactively discuss the changes **before** implementation</small>

---

#### Security

- AI code **may** introduce **vulnerabilities**<br><small>Insecure defaults, SQL injection, outdated cryptographic patterns, hardcoded secrets</small>
- Output **looks** correct, flaws are **invisible** at a glance
- AI models are trained on the internet, including **vulnerable code**

> <small>Treat generated code with the same scrutiny as **third-party code**: it may work, but you don't know what it hides **until** you look.</small>

---

#### Ownership 1/2

Ownership is about **accountability** and **understanding**:
not just who *wrote* the code, but who *understands* it and is *responsible* for it.

> <small>The developer should not become a **curator** but should remain an **author**. When something breaks someone must actually understand **why** and **how** it worked.</small>

---

#### Ownership 2/2

* **Intellectual ownership** <small>Can you explain every line in a PR you submitted? If the AI wrote it and you didn't read it carefully, the answer is often no</small>
* **Accountability drift** <small>*"the AI wrote it"* is not a defense when it ships a bug to production *(customers do not care)*. You reviewed it, you own it. </small>
* **Maintenance burden** <small>Code you don't understand is code you can't confidently change later. AI can generate faster than humans can absorb</small>
* **Pride and craft** <small>Ownership also has a positive side: taking genuine pride in what you ship, even when AI assisted, because you made real decisions about it</small>

---

#### Cognitive Surrender 1/2

- Treating AI answers as **solid truth** rather than a starting point
- Losing the habit of forming your **own** hypotheses before asking
- Skill **atrophy** in areas where you now delegate to AI
- **Reduced** tolerance for ambiguity (*"just tell me the answer"*)

---

#### Cognitive Surrender 2/2

The best developers are **lazy** by nature.

But there is a difference between **automating toil** and **outsourcing thinking**.

One should not let AI become a **liability** multiplier rather than a **force** multiplier.

> <small>Technical debt now comes with **cognitive debt**.</small>

---

#### Conclusion

* **Engineering practices**<br><small>What you already know; this is your **foundation**</small>
* **Human in the loop**<br><small>AI changes the process; you must stay an **active** checkpoint</small>
* **Ownership**<br><small>You remain **accountable**, not just a curator</small>
* **Cognitive Surrender**<br><small>This is what happens if you **abandon** all of the above</small>

AI is a powerful **tool** but with **weaknesses**,<br>you are **still** the engineer.
