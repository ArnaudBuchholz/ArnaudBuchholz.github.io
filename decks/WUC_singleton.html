|title|The **singleton** pattern|

### What ?

The singleton pattern restricts the **instantiation** of a class to a **single instance**.

It is useful when **one object** is needed to coordinate actions in a software *(without storing it in a global variable)*.

---

#### How ?

There are different ways to **implement** a singleton in JavaScript :

* Using the JavaScript **constructor function**
* Using the **factory pattern**
* And many more...

---

### Constructor function

In JavaScript, the [**constructor function**](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Classes/constructor) is invoked with the created instance (`this`).

Thanks to [**return overriding**](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Classes/Private_class_fields#returning_overriding_object),
it is possible to replace it with a **previously allocated object**.

```JavaScript
export class Singleton {
  static #instance

  constructor () {
    Singleton.instance ??= this;
    return Singleton.instance;
  }

  /* members */
};
```

---

#### Usage / Test of the constructor function

```JavaScript
import { Singleton } from './Singleton.js';
import assert from 'node:assert/strict';

const instance1 = new Singleton();
const instance2 = new Singleton();

assert.strictEqual(instance1, instance2);
```

---

### Factory function

A **factory function** is usually designed to build instances of a class.

```JavaScript
let instance;

class Singleton {
  /* members */
};

export singletonFactory = () => {
  instance ?? new Singleton();
  return instance;
};
```

By returning the **previously allocated object**, the factory function returns a **singleton**.

---

#### Usage / Test of the factory function

```JavaScript
import { singletonFactory } from './singletonFactory.js';
import assert from 'node:assert/strict';

const instance1 = singletonFactory();
const instance2 = singletonFactory();

assert.strictEqual(instance1, instance2);
```
