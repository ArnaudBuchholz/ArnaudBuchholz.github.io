### The **Problem**

Every algorithm needs a **context**,<br>
it may come from :

* An inbound **HTTP request**
* An incoming **Pub/Sub message**
* **Command line** parameters
* ...

---

#### Example

```TypeScript
async function processOrder(
  orderId: string,
  customerId: number,
  correlationId: string
) {
  logEvent('Processing order', customerId, correlationId);
  await validateOrder(orderId, customerId, correlationId);
  // ... more calls
}

async function validateOrder(
  orderId: string,
  customerId: number,
  correlationId: string
) {
  /* ... more nested calls */
}
```

---

#### The **Problems**

- ❌ Context **parameters** are passed through **every** function
- ❌ Function **signatures** become **bloated**, increasing the **cognitive** complexity<br><small>*The developper may hardcode values not knowing what to pass*</small>
- ❌ It's easy to **forget** passing context down
- ❌ It's hard to add **new** context values<br><small>*as it means changing all intermediate functions !*</small>

<small>💡 *Passing one huge object through all fonctions (like the `request` object)<br>is **not** a solution.*</small>

---

### **Forwarded** context

What if we could access the context<br>**without** passing it ?

```TypeScript
async function processOrder(orderId: string) {
  logEvent('Processing order', getCustomerId(), getCorrelationId());
  await validateOrder(orderId);
  // ... more calls
}

async function validateOrder(orderId: string) {
  // ... more nested calls
}
```

---

### `AsyncLocalStorage`

Node.js' [`AsyncLocalStorage`](https://nodejs.org/api/async_context.html) is like a *"thread-local storage"*
for **async** *and* **sync** operations.

```TypeScript
import { AsyncLocalStorage } from 'node:async_hooks';
const storage = new AsyncLocalStorage<{ userId: number }>();
storage.run({ userId: 123 }, async () => {
  console.log(storage.getStore()?.userId); // 123
  
  async function deepFunction() {
    console.log(storage.getStore()?.userId); // Still 123!
  }
  await deepFunction();
});

console.log(storage.getStore()?.userId); // undefined
```

<small>Express example : [training-nodejs-async-local-storage](https://github.com/ArnaudBuchholz/training-nodejs-async-local-storage)</small>

#### Pattern Architecture (1/3) : Context **Manager**

```TypeScript
import { AsyncLocalStorage } from 'node:async_hooks';
import type { Context } from 'Context.js';

const storage = new AsyncLocalStorage<Context>();

/** throws if no context exists */
export const getContextStore = (): Context => {
  const store = storage.getStore();
  if (!store) {
    throw new Error('No context available !');
  }
  return store;
};

export const getContextManager = () => storage;
```

---

#### Pattern Architecture (2/3) : Context **Setter**

A middleware **sets** the context<br>at the **beginning** of each inbound request.

```TypeScript
app.use((req, res, next) => {
  const context = {
    customerId: extractCustomerId(req),
    correlationId: req.headers['x-correlation-id'],
  };

  getContextManager().run(context, () => {
    // Everything inside this callback has access to context
    next();
  });
});
```

---

#### Pattern Architecture (3/3) : Context **Getters**

As `getContextStore()` throws when context is missing, the getters are **easy** to write :

```TypeScript
export const getCustomerId = () => getContextStore().customerId;
export const getCorrelationId = () => getContextStore().correlationId;
```

---

#### PROs/CONs

- ✅ **Centralized** context handling
- ✅ **Efficient** with small **digital footprint**
- ❌ **Must** use `AsyncLocalStorage` for all use case
- ❌ Hard to **mock** and **test**

---

### **Simple** Use Case

When dealing with command lines,<br>it *should* not be so **complicated**.

```TypeScript
const context = {
  customerId: getCustomerIdFromCmdLine(),
  correlationId: '', // This is not even used !
};

getContextManager().run(context, () => {
  executeCmdLine()
});
```

### Context **Container** 

A layer of **abstraction** to **access** the context.

```TypeScript
class ContextContainer {
  static _customerIdProvider?: () => number;
  static registerCustomerIdProvider(provider: () => number) {
    this._customerIdProvider = provider;
    return Registry; // Enable chaining
  }
  static getCustomerId(): number {
     if (!this._customerIdProvider) {
      throw new Error('No customer ID provider registered');
    }
    return provider();
  }
  
  // same pattern for correlationId
}
```

---

#### Usage

Usage remains *almost* the **same**.

```TypeScript
async function processOrder(orderId: string) {
  logEvent(
    'Processing order',
    ContextContainer.getCustomerId(),
    ContextContainer.getCorrelationId()
  );
  await validateOrder(orderId);
  // ... more calls
}
```

---

#### Setup (1/2)

But it requires a **setup**,<br>for instance when using the middleware :

```TypeScript
export const getCustomerId = () => getContextStore().customerId;
export const getCorrelationId = () => getContextStore().correlationId;
```

```TypeScript
// Before starting the server
ContextContainer
  .registerCustomerIdProvider(getCustomerId)
  .registerCorrelationIdProvider(getCorrelationId);
```

---

#### Setup (2/2)

And for the **command line** use case :

```TypeScript
const customerId = getCustomerIdFromCmdLine()
ContextContainer
  .registerCustomerIdProvider(() => customerId));
// No need to care about correlationId or wrap the following with run
executeCmdLine()
```

---

#### PROs/CONs

- ✅ Removes the need for `AsyncLocalStorage` for simple use cases
- ✅ Simplifies tests by registering test providers
- ❌ Requires setup
- ❌ Can not mix use cases (unless you create complex providers)

---

### Mixing Use Case (1/2)

A service *may* handle **both** inbound requests and PubSub messages.

```TypeScript
// Global setup because of the middleware
ContextContainer
  .registerCustomerIdProvider(getCustomerId)
  .registerCorrelationIdProvider(getCorrelationId);
```

---

#### Mixing Use Case (2/2)

Because providers are **global**,<br>the PubSub message is **enclosed** within :

```TypeScript
async function onIncomingPubSubMessage (message: PubSubMessage) {
  const context = {
    customerId: extractCustomerId(message),
    correlationId: extractCorrelationId(message),
  };

  await getContextManager().run(context, () => {
    handlePubSubMessage(message);
  });
});
```

---

### ContextContainer.**runWith**

What if we could **temporarily override** the providers for a **given call chain** ?
something like :

```TypeScript
async function onIncomingPubSubMessage (message: PubSubMessage) {
  ContextContainer.runWith({
    customerId: () => extractCustomerId(message),
    correlationId: () => extractCorrelationId(message), 
  }, () => handlePubSubMessage(message))
});
```

Looks **familiar** ?

---

#### Using `AsyncLocalStorage` within `ContextContainer` (1/2)

```TypeScript
class ContextContainer {
  static async runWith (
    providers: Providers,
    callback: callback: () => void | Promise<void>
  ) {
    const storage = getRunWithManager();
    await storage.run(providers, callback);
  }
  /* ... */
}
```

<small>💡 `Providers` type members *may* be optional *(i.e. setting `customerId` only)*</small>

---

#### Using `AsyncLocalStorage` within `ContextContainer` (2/2)

```TypeScript
class ContextContainer {
  static getCustomerId(): number {
    const store = getRunWithManager().getStore();
    if (store?.customerId) {
      return store?.customerId();
    }
    if (!this._customerIdProvider) {
      throw new Error('No customer ID provider registered');
    }
    return provider();
  }
  /* ... */
}
```

---

#### PROs/CONs

- ✅ Enables **mixing** of use cases in a **flexible** way
- ❌ Makes the `ContextContainer` implementation more **complex**
- ❌ Must **secure** this mechanism against **uncontrolled nested** calls

---

### Key **Take-Aways**

- Context handled by a **central** manager
- Foster **reusability** of codebase<br><small>*(same function can be used in different scenarios)*</small>
- Improves **testability**
