|title|Regular **expressions** &amp; **capturing** groups|

*"Regular expressions are **only** for **matching** strings"*

is a common **misconception**.

<br/>

It is a **powerful** too that
can also **extract** values from the matched string.

<br/>

Regular expressions **and** capturing groups are tightly **integrated**
with the JavaScript language.

---

### What is a **capturing** group ?

A pair of **parenthesis** define a capturing group.

```JavaScript
const imageDescription = 'Image resolution is 1440×900 pixels.';
const regexpSize = /(\d+)×(\d+)/;
const match = imageDescription.match(regexpSize);
console.log(`Width: ${match[1]} / Height: ${match[2]}.`);
// expected output: "Width: 1440 / Height: 900."
```

<small>[🧪 try it](https://regex101.com/r/00tSLd/1)</small>

<small>💡 to capture a **repeated** pattern,
make sure the repetition is **enclosed** inside
parenthesis or the regexp captures only the **last** occurrence.
</small>

---

The result of a match is an **array-like** object :

```JavaScript
{
  '0': '1440x900',
  '1': '1440',
  '2': '900',
  index: 31,
  input: 'This image has a resolution of 1440x900 pixels.'
}
```

* `match[0]` contains the matching string,
* `match[1]` contains the value of the **first** capturing group,
* `match[2]` contains the value of the **second** capturing group,</li>
* ...

---

### String.**replaceAll**

Used with a [replacer function](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/String/replace#specifying_a_function_as_the_replacement),
the capturing group values are provided as **additional parameters**.

```JavaScript
// <h1>Title</h1> => <div class="h1">Title</div>

html.replaceAll(
  /&lt;(h\d)>([^<]*)<\/h\d>/ig,
  (match, titleTag, content) =>
    `<div class="${titleTag}">${content}</div>`
);
```

<small>[🧪 try it](https://regex101.com/r/BRStjr/1)</small>

---

#### String.**split**

The resulting array<br/>**includes** the capturing group values.

```JavaScript
"Arnaud was here".split(/[aeiouy]+/i); // no capturing group
// [ '', 'rn', 'd w', 's h', 'r', '' ]

"Arnaud was here".split(/([aeiouy]+)/i); // keeps vowels
// [ '', 'A', 'rn', 'au', 'd w', 'a', 's h', 'e', 'r', 'e', '']
```
