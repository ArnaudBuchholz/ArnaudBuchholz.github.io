|title|**async** / **await**|

### **Async** Function

An `async` function **always** returns a [**promise**](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise).

```JavaScript
async function hello() {
  return 'world';
}

// is equivalent to

function hello() {
  return Promise.resolve('world');
}
```

---

#### Exceptions **Handling**

Any **uncaught exception** occurring inside the function body is automatically converted into a **rejected promise**.

```JavaScript
async function hello() {
  return transform('world');
}

// is equivalent to

function hello() {
  try {
    return Promise.resolve(transform('world'));
  } catch (error) {
    return Promise.reject(error);
  }
}
```

---

#### **Important** Notes

An `async` function does not **magically**<br/>
become **asynchronous** :<br/>
it solely depends on the **function body**.

<br/>

⚠️ Every rejected promise **must** be handled.
![rejected promise](WUC/async_await/uncaught%20rejected%20promise.png)

---

### **await**

The `await` keyword is available only* inside an **async** function.

It **waits** for a **promise** to be **settled** :
* When **fulfilled**, the value is **returned** and the next statement **executed**.
* When **rejected**, the **await** keyword **throws** an exception with the **rejection reason**.

<small>* Inside a module, you might use a [**top level await**](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/await#top_level_await).</small>

---

#### Awaited **Value**

`await` can be used with **any** value but it makes sense mostly with promises.

```JavaScript
async function examples () {
  console.log(await 'Hello World!'); // valid
}
```

It works with [**Thenable** objects](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise#thenables).

---

#### **Sequential** vs **Parallel**

```JavaScript
async function sequential () {
  const result1 = await asyncMethod1();
  const result2 = await asyncMethod2(); // asyncMethod1 completed
}

async function parallel () {
  const promise1 = asyncMethod1();
  const promise2 = asyncMethod2(); // asyncMethod1 still in progress
  const result1 = await promise1;
  const result2 = await promise2;
}

async function parallelAndDestructuring () {
  const [result1, result2] = await Promise.all([
    asyncMethod1(),
    asyncMethod2()
  ]);
}
```
