|title|Introduction to **Mutation** testing|

### Context

Considering the **function** to test :

```JavaScript
function div (a, b) {
  if (b === 0) {
    throw new Error('Do not divide by 0');
  }
  return a / b;
}
```

And the **test code** :

```JavaScript
assert.throws(() => div(1,0));
assert.notEqual(div(1,2), 0);
```

Code **coverage** is **100%**

---

#### What does it **really** mean ?

✔️ All statements are **evaluated during** the tests.

❌ It does **not** guarantee that the code was **thoroughly checked**.

---

#### In the **example**

```JavaScript
assert.throws(() => div(1,0));
```

* The exception is not **validated** *(type and message)*,

```JavaScript
assert.notEqual(div(1,2), 0);
```

* The result is not **compared** with any **meaningful** value.

---

### What is **mutation** testing ?

For each **covered statement** :

* The source code is modified with a single **mutation** to generate a **mutant**,

* The tests are **executed** to check if they **still pass**.

If a mutant **survives** the tests, a **defect** is **not detected** !
Meaning tests are **incomplete**.

---

#### Examples of **mutations** (1/2)

* **Removing** a statement

  ```JavaScript
  function div (a, b) {
    if (b === 0) {}
    return a / b;
  }
  ```

* Forcing **conditions** to `true` or `false`

  ```JavaScript
  function div (a, b) {
    if (true) {
      throw new Error('Do not divide by 0');
    }
    return a / b;
  }
  ```

---

#### Examples of **mutations** (2/2)

* Changing **operators**

  ```JavaScript
  function div (a, b) {
    if (b === 0) {
      throw new Error('Do not divide by 0');
    }
    return a * b;
  }
  ```

* Changing **static content** *(strings, numbers...)*

  ```JavaScript
  function div (a, b) {
    if (b === 0) {
      throw new Error('I am a mutant');
    }
    return a / b;
  }
  ```

#### Mutation **report** and **score**

A report details, for each source, the **generated mutants** and their associated **tests result** *(killed, survived or timed out)*.


The **mutation score** evaluates the **percentage** of mutants **detected** during the process :
the **highest** the value, the **better** the tests.

*(timed out usually means detected)*

---

#### **Benefits** and **drawbacks**

* ✔️ **Automatically** measure the quality **and** relevance of the tests,
* ✔️ **Increase** the code quality and robustness.
* ❌ **Consume** resources *(time / CPU / storage, do not automate in the CI/CD pipeline)*,
* ❌ **Must** be limited to **unit tests** with proper isolation from external dependencies.

---
